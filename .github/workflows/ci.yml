name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --extra audio
      - name: Ruff
        run: uv run ruff check .
      - name: Compile
        run: uv run python -m compileall transclip scripts tests
      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --extra audio --extra mlx
      - name: Ruff
        run: uv run ruff check .
      - name: Compile
        run: uv run python -m compileall transclip scripts tests
      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v
      - name: MLX import smoke
        run: uv run python -c "import platform, mlx; from mlx_audio.stt.generate import generate_transcription; print(platform.machine(), generate_transcription)"

  windows:
    runs-on: windows-latest
    env:
      UV_LINK_MODE: copy
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra dev --extra audio --extra windows-ui
      - name: Ruff
        run: uv run ruff check .
      - name: Compile
        run: uv run python -m compileall transclip scripts tests
      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v
      - name: Windows eval gate wiring
        run: |
          uv run python -c "
          from pathlib import Path
          from transclip.eval_harness import EvalGatePolicy
          policy = EvalGatePolicy.from_manifest(Path('eval/windows/manifest.json'))
          cases = policy.min_cases
          payload = {
              'summary': {
                  'cases': cases,
                  'mean_release_to_ready_ms': 300.0,
                  'under_700ms': cases,
                  'mean_keyword_preservation': 1.0,
                  'mean_wer': 0.05,
                  'cleanup_semantic_drift_failures': 0,
                  'paste_failures': 0,
              },
              'results': [{'timings_ms': {'end_to_end': 300.0}}] * cases,
          }
          report = policy.check_results(payload)
          assert report['status'] == 'pass', report
          "
      - name: Windows integration smoke
        run: uv run python -c "import keyboard, pystray; from PIL import Image; import transclip.win32_clipboard; import transclip.hotkey_windows; import transclip.tray_win32; print('windows-integration ok')"
