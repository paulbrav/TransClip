<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Granite Speach</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>Granite Speach</h1>
          <p id="service-url">http://127.0.0.1:8765</p>
        </div>
        <div class="status" id="status">Loading</div>
      </section>

      <section class="controls">
        <button id="refresh" type="button">Refresh</button>
        <button id="start-service" type="button">Start service</button>
        <button id="record-start" type="button">Record</button>
        <button id="record-stop-paste" type="button">Stop + Paste</button>
        <button id="record-stop" type="button">Stop</button>
        <button id="copy" type="button">Copy</button>
        <button id="paste" type="button">Paste</button>
        <label class="toggle">
          <input id="cleanup" type="checkbox" checked />
          Cleanup
        </label>
      </section>

      <p class="error" id="error" aria-live="polite"></p>

      <section class="transcript">
        <label for="latest">Latest transcript</label>
        <textarea id="latest" spellcheck="false"></textarea>
      </section>

      <section class="health">
        <pre id="health"></pre>
      </section>
    </main>
  </body>
</html>
